                  type: number
                  exclusiveMinimum: 0
                  description: Required if type = FIXED
                pricePerKg:
                  type: number
                  exclusiveMinimum: 0
                  description: Required if type = PER_KG
                minWeight:
                  type: number
                  exclusiveMinimum: 0
                maxWeight:
                  type: number
                  exclusiveMinimum: 0
