openapi: "3.0.3"

info:
  title: Delivery Backend API
  version: 1.0.0
  description: |
    Logistics delivery management API for managing shipments, drivers, payments,
    and real-time tracking. Built with Express 5 + TypeScript + Prisma + PostgreSQL.

    **Auth flow:**
    1. `POST /auth/register` or `POST /auth/login` to get a JWT token
    2. Include `Authorization: Bearer <token>` in subsequent requests

    **Seed credentials** (dev):
    - ADMIN: `admin@example.com` / `Password123!`
    - STAFF: `staff@example.com` / `Password123!`
    - DRIVER: `driver@example.com` / `Password123!`
    - CUSTOMER: `customer@example.com` / `Password123!`

    **Response envelope:**
    ```
    // Success
    { "success": true, "message": "string", "data": { ... } }

    // Error
    { "success": false, "message": "string", "statusCode": 400, "details": null }

    // Validation error (422)
    { "success": false, "message": "Validation Error", "statusCode": 422, "details": { ... } }
    ```

servers:
  - url: http://localhost:{port}
    description: Local development
    variables:
      port:
        default: "3000"
        description: Server port (set via PORT env)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, password]
              properties:
                name:
                  type: string
                  minLength: 1
                  example: Alice
                email:
                  type: string
                  format: email
                  example: alice@example.com
                phone:
                  type: string
                  minLength: 6
                  example: "+251911111111"
                password:
                  type: string
                  minLength: 8
                  format: password
                  example: Password123!
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error409"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error422"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/phone and password
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emailOrPhone, password]
              properties:
                emailOrPhone:
                  type: string
                  minLength: 3
                  example: admin@example.com
                password:
                  type: string
                  minLength: 1
                  format: password
                  example: Password123!
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: User is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error422"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: authMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"

  /users:
    post:
      tags: [Users]
      summary: Create a new user (any role)
      operationId: usersCreate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, password, role]
              properties:
                name:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  minLength: 6
                password:
                  type: string
                  minLength: 8
                  format: password
                role:
                  $ref: "#/components/schemas/UserRole"
                status:
                  $ref: "#/components/schemas/UserStatus"
                  default: ACTIVE
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error409"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error422"

    get:
      tags: [Users]
      summary: List users (paginated, filterable)
      operationId: usersList
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - in: query
          name: role
          schema:
            $ref: "#/components/schemas/UserRole"
          description: Filter by role
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/UserStatus"
          description: Filter by status
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      operationId: usersGetById
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /users/{id}/status:
    patch:
      tags: [Users]
      summary: Update user active/inactive status
      operationId: usersUpdateStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/UserStatus"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Change user role
      operationId: usersUpdateRole
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "200":
          description: Role updated (Driver profile created/removed as needed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /drivers:
    get:
      tags: [Drivers]
      summary: List drivers (paginated, filterable by availability)
      operationId: driversList
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - in: query
          name: isAvailable
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by driver availability
      responses:
        "200":
          description: Paginated driver list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/DriverWithUser"
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN or STAFF)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"

  /drivers/{id}:
    get:
      tags: [Drivers]
      summary: Get driver by ID
      operationId: driversGetById
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Driver ID (not User ID)
      responses:
        "200":
          description: Driver found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/DriverWithUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN or STAFF)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: Driver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /driver/shipments:
    get:
      tags: [Driver Self]
      summary: Get shipments assigned to the authenticated driver
      operationId: driverSelfShipments
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of assigned shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Shipment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires DRIVER role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"

  /driver/update-location:
    put:
      tags: [Driver Self]
      summary: Update driver's current GPS location
      operationId: driverSelfUpdateLocation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat:
                  type: number
                  minimum: -90
                  maximum: 90
                  example: 9.03
                lng:
                  type: number
                  minimum: -180
                  maximum: 180
                  example: 38.74
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Driver"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires DRIVER role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"

  /driver/update-status/{shipmentId}:
    put:
      tags: [Driver Self]
      summary: Update shipment status (driver-initiated transitions)
      operationId: driverSelfUpdateStatus
      description: |
        Allowed status transitions for drivers:
        - CREATED → PICKED_UP
        - PICKED_UP → IN_TRANSIT
        - IN_TRANSIT → OUT_FOR_DELIVERY
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: shipmentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PICKED_UP, IN_TRANSIT, OUT_FOR_DELIVERY]
                  description: Next status for the shipment
                locationText:
                  type: string
                  minLength: 1
                  description: Free-text location description
                lat:
                  type: number
                  minimum: -90
                  maximum: 90
                lng:
                  type: number
                  minimum: -180
                  maximum: 180
      responses:
        "200":
          description: Shipment status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Shipment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (not assigned to this driver or wrong role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /shipments:
    post:
      tags: [Shipments]
      summary: Create a new shipment
      operationId: shipmentsCreate
      description: |
        Generates a unique tracking number (DLV-YYYYMMDD-XXXXXX), creates
        shipment events, delivery proof with OTP, and a payment record.
        Optionally creates a COD transaction if codAmount > 0.
        In development mode, the raw OTP is returned as `devOtp`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [senderName, senderPhone, receiverName, receiverPhone, pickupAddress, deliveryAddress, packageType, weight]
              properties:
                senderName:
                  type: string
                  minLength: 1
                senderPhone:
                  type: string
                  minLength: 6
                receiverName:
                  type: string
                  minLength: 1
                receiverPhone:
                  type: string
                  minLength: 6
                pickupAddress:
                  type: string
                  minLength: 1
                deliveryAddress:
                  type: string
                  minLength: 1
                pickupLat:
                  type: number
                  minimum: -90
                  maximum: 90
                pickupLng:
                  type: number
                  minimum: -180
                  maximum: 180
                deliveryLat:
                  type: number
                  minimum: -90
                  maximum: 90
                deliveryLng:
                  type: number
                  minimum: -180
                  maximum: 180
                packageType:
                  type: string
                  minLength: 1
                  example: DOCUMENT
                weight:
                  type: number
                  exclusiveMinimum: 0
                  example: 2.5
                price:
                  type: number
                  exclusiveMinimum: 0
                  description: If omitted, auto-computed from active PricingRules
                paymentMethod:
                  $ref: "#/components/schemas/PaymentMethod"
                  default: CASH
                codAmount:
                  type: number
                  exclusiveMinimum: 0
                  description: If > 0, creates a COD transaction
      responses:
        "201":
          description: Shipment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/ShipmentCreateResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error422"

    get:
      tags: [Shipments]
      summary: List shipments (paginated, filterable)
      operationId: shipmentsList
      description: |
        CUSTOMER role: only sees their own shipments (createdById).
        ADMIN/STAFF: sees all shipments.
        DRIVER: gets 403 (use /driver/shipments instead).
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ShipmentStatus"
          description: Filter by shipment status
        - in: query
          name: assignedDriverId
          schema:
            type: string
            format: uuid
          description: Filter by assigned driver
        - in: query
          name: trackingNumber
          schema:
            type: string
            minLength: 3
          description: Partial case-insensitive search on tracking number
        - in: query
          name: senderPhone
          schema:
            type: string
            minLength: 3
          description: Partial search on sender phone
        - in: query
          name: receiverPhone
          schema:
            type: string
            minLength: 3
          description: Partial search on receiver phone
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date-time
          description: Filter shipments created on or after this date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
          description: Filter shipments created on or before this date
      responses:
        "200":
          description: Paginated shipment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ShipmentListItem"
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (DRIVER role not allowed here)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"

  /shipments/{id}:
    get:
      tags: [Shipments]
      summary: Get full shipment details by ID
      operationId: shipmentsGetById
      description: |
        Returns shipment with nested events, payment, COD, delivery proof, driver, and creator.
        Access control depends on role.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/shipmentId"
      responses:
        "200":
          description: Full shipment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/ShipmentDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (access denied based on role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /shipments/{id}/assign-driver:
    patch:
      tags: [Shipments]
      summary: Assign a driver to a shipment
      operationId: shipmentsAssignDriver
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/shipmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [driverId]
              properties:
                driverId:
                  type: string
                  format: uuid
                  description: Driver record ID (not User ID)
      responses:
        "200":
          description: Driver assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Shipment"
        "400":
          description: User is not a DRIVER
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error400"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN or STAFF)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
        "404":
          description: Driver or Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /shipments/{id}/status:
    patch:
      tags: [Shipments]
      summary: Update shipment status (admin/staff)
      operationId: shipmentsUpdateStatus
      description: |
        Allowed transitions:
        - CREATED → PICKED_UP | CANCELLED
        - PICKED_UP → IN_TRANSIT | CANCELLED
        - IN_TRANSIT → OUT_FOR_DELIVERY | CANCELLED
        - OUT_FOR_DELIVERY → DELIVERED | CANCELLED
        - DELIVERED / CANCELLED → (none)

        Special rules:
        - DELIVERED requires OTP verification first; COD must be collected if exists.
        - CANCELLED not allowed if already delivered.
        - OUT_FOR_DELIVERY sends SMS to receiver.
        - DELIVERED sends SMS to receiver.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/shipmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/ShipmentStatus"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Shipment"
        "400":
          description: Invalid transition or prerequisite not met
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error400"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Forbidden (requires ADMIN or STAFF)
          content:
