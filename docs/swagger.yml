      summary: Get QR code for a shipment (base64 PNG data URL)
      operationId: shipmentsGetQr
      description: The QR code encodes the public tracking URL.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/shipmentId"
      responses:
        "200":
          description: QR code data URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      dataUrl:
                        type: string
                        format: uri
                        example: "data:image/png;base64,iVBOR..."
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

  /shipments/{id}/verify-otp:
    post:
      tags: [Shipments]
      summary: Verify delivery OTP
      operationId: shipmentsVerifyOtp
      description: Verify the 6-digit OTP for delivery proof. Required before marking as DELIVERED.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/shipmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit OTP code
                  example: "123456"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      verified:
                        type: boolean
                        example: true
                      verifiedAt:
                        type: string
                        format: date-time
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error400"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "404":
          description: Delivery proof not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

