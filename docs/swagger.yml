components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login or /auth/register

  parameters:
    page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page
    userId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: User ID
    shipmentId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Shipment ID
    shipmentIdPath:
      in: path
      name: shipmentId
      required: true
      schema:
        type: string
        format: uuid
      description: Shipment ID
    pricingRuleId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Pricing rule ID

  schemas:
    # ─── Enums ──────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [ADMIN, STAFF, DRIVER, CUSTOMER]

    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    ShipmentStatus:
      type: string
      enum: [CREATED, PICKED_UP, IN_TRANSIT, OUT_FOR_DELIVERY, DELIVERED, CANCELLED]

    PaymentMethod:
      type: string
      enum: [TELEBIRR, CBE_BIRR, CASH]

    PaymentStatus:
      type: string
      enum: [PENDING, PAID, FAILED, CANCELLED]

    PricingType:
      type: string
      enum: [FIXED, PER_KG]

    DeliveryProofType:
      type: string
      enum: [OTP, PHOTO]

    # ─── User ───────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Driver ─────────────────────────────────────────────────────
    Driver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        isAvailable:
          type: boolean
        currentLat:
          type: number
          nullable: true
        currentLng:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DriverWithUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        isAvailable:
          type: boolean
        currentLat:
          type: number
          nullable: true
        currentLng:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            email:
              type: string
              format: email
              nullable: true
            phone:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
            status:
              $ref: "#/components/schemas/UserStatus"

    # ─── Shipment ───────────────────────────────────────────────────
    Shipment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        trackingNumber:
          type: string
          example: DLV-20260508-A3B5C7
        senderName:
          type: string
        senderPhone:
          type: string
        receiverName:
          type: string
        receiverPhone:
          type: string
        pickupAddress:
          type: string
        deliveryAddress:
          type: string
        pickupLat:
          type: number
          nullable: true
        pickupLng:
          type: number
          nullable: true
        deliveryLat:
          type: number
          nullable: true
        deliveryLng:
          type: number
          nullable: true
        packageType:
          type: string
        weight:
          type: number
        price:
          type: number
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        createdById:
          type: string
          format: uuid
          nullable: true
        assignedDriverId:
          type: string
          format: uuid
          nullable: true
        assignedById:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShipmentCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        trackingNumber:
          type: string
        senderName:
          type: string
        senderPhone:
          type: string
        receiverName:
          type: string
        receiverPhone:
          type: string
        pickupAddress:
          type: string
        deliveryAddress:
          type: string
        packageType:
          type: string
        weight:
          type: number
        price:
          type: number
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deliveryProof:
          $ref: "#/components/schemas/DeliveryProof"
        payment:
          $ref: "#/components/schemas/Payment"
        codTransaction:
          allOf:
            - $ref: "#/components/schemas/CodTransaction"
            - nullable: true
        devOtp:
          type: string
          description: Only returned in NODE_ENV=development

    ShipmentListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        trackingNumber:
          type: string
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        senderName:
          type: string
        receiverName:
          type: string
        createdAt:
          type: string
          format: date-time

    ShipmentDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        trackingNumber:
          type: string
        senderName:
          type: string
        senderPhone:
          type: string
        receiverName:
          type: string
        receiverPhone:
          type: string
        pickupAddress:
          type: string
        deliveryAddress:
          type: string
        pickupLat:
          type: number
          nullable: true
        pickupLng:
          type: number
          nullable: true
        deliveryLat:
          type: number
          nullable: true
        deliveryLng:
          type: number
          nullable: true
        packageType:
          type: string
        weight:
          type: number
        price:
          type: number
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        createdById:
          type: string
          format: uuid
          nullable: true
        assignedDriverId:
          type: string
          format: uuid
          nullable: true
        assignedById:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        events:
          type: array
          items:
            $ref: "#/components/schemas/ShipmentEvent"
        payment:
          $ref: "#/components/schemas/Payment"
        codTransaction:
          allOf:
            - $ref: "#/components/schemas/CodTransaction"
            - nullable: true
        deliveryProof:
          $ref: "#/components/schemas/DeliveryProof"
        assignedDriver:
          allOf:
            - $ref: "#/components/schemas/DriverWithUser"
            - nullable: true
        createdBy:
          allOf:
            - type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
                  format: email
                  nullable: true
                phone:
                  type: string
                role:
                  $ref: "#/components/schemas/UserRole"
            - nullable: true

    # ─── ShipmentEvent ──────────────────────────────────────────────
    ShipmentEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shipmentId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        locationText:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        actorId:
          type: string
          format: uuid
          nullable: true
        timestamp:
          type: string
          format: date-time

    # ─── DeliveryProof ──────────────────────────────────────────────
    DeliveryProof:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/DeliveryProofType"
        verified:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        otpExpiresAt:
          type: string
          format: date-time
          nullable: true
        photoUrl:
          type: string
          format: uri
          nullable: true

    # ─── Payment ────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shipmentId:
          type: string
          format: uuid
        amount:
          type: number
        method:
          $ref: "#/components/schemas/PaymentMethod"
        status:
          $ref: "#/components/schemas/PaymentStatus"
        providerReference:
          type: string
          nullable: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── CodTransaction ─────────────────────────────────────────────
    CodTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shipmentId:
          type: string
          format: uuid
        amount:
          type: number
        collected:
          type: boolean
        collectedAt:
          type: string
          format: date-time
          nullable: true
        collectedByDriverId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── PricingRule ────────────────────────────────────────────────
    PricingRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/PricingType"
        packageType:
          type: string
          nullable: true
        fixedPrice:
          type: number
          nullable: true
        pricePerKg:
          type: number
          nullable: true
        minWeight:
          type: number
          nullable: true
        maxWeight:
          type: number
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Tracking ───────────────────────────────────────────────────
    TrackingInfo:
      type: object
      properties:
        trackingNumber:
          type: string
        status:
          $ref: "#/components/schemas/ShipmentStatus"
        senderName:
          type: string
        senderPhone:
          type: string
        receiverName:
          type: string
        receiverPhone:
          type: string
        pickupAddress:
          type: string
        deliveryAddress:
          type: string
        packageType:
          type: string
        weight:
          type: number
        latestEvent:
          allOf:
            - $ref: "#/components/schemas/ShipmentEvent"
            - nullable: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/ShipmentEvent"

    # ─── Auth Response ──────────────────────────────────────────────
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT bearer token
            user:
              $ref: "#/components/schemas/User"

    # ─── Error Responses ────────────────────────────────────────────
    Error400:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        statusCode:
          type: integer
          example: 400
        details:
          type: string
          nullable: true

    Error401:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Unauthorized
        statusCode:
          type: integer
          example: 401
        details:
          type: string
          nullable: true

    Error403:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Forbidden
        statusCode:
          type: integer
          example: 403
        details:
          type: string
          nullable: true

    Error404:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Not found
        statusCode:
          type: integer
          example: 404
        details:
          type: string
          nullable: true

    Error409:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        statusCode:
          type: integer
          example: 409
        details:
          type: string
          nullable: true

    Error422:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation Error
        statusCode:
          type: integer
          example: 422
        details:
          type: object
          description: Zod flatten() output with field-level errors
          nullable: true

    Error500:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        statusCode:
          type: integer
          example: 500
        details:
          type: string
          nullable: true

tags:
  - name: Health
    description: Server health check
  - name: Auth
    description: Authentication and user registration
  - name: Users
    description: User management (ADMIN only)
  - name: Drivers
    description: Driver management (ADMIN, STAFF)
  - name: Driver Self
    description: Driver self-service endpoints (DRIVER only)
  - name: Shipments
    description: Shipment CRUD and management
  - name: Tracking
    description: Public shipment tracking (no auth required)
  - name: Payments
    description: Payment management
  - name: COD
    description: Cash on delivery management
  - name: Pricing
    description: Pricing rule management (ADMIN only)
  - name: Integrations
    description: Third-party provider integrations (ADMIN, STAFF)
  - name: Reports
    description: Dashboard reports and analytics (ADMIN, STAFF)
